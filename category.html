<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Категория политических заключённых">
    <title>Категория</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
    <script src="category.js" defer></script>
</head>
<body>
    <a class="skip-link" href="#main-content">Перейти к содержанию</a>

    <main id="main-content" class="page">
        <div id="loading" class="status-message" aria-live="polite">
            <p>Загрузка…</p>
        </div>

        <div id="error" class="status-message status-message--error" hidden role="alert">
            <h1 class="status-message__title">Не удалось загрузить страницу</h1>
            <p id="error-text"></p>
        </div>

        <section id="category" class="category" hidden aria-labelledby="category-title">
            <header class="category__header">
                <h1 id="category-title" class="category__title"></h1>
            </header>

            <ul id="card-grid" class="card-grid" role="list"></ul>
        </section>
    </main>
</body>
</html>
